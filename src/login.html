<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Souveniria</title>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    :root {
      --primary: #525c38; /* Based on image color */
      --secondary: #8C7B65;
      --bg-color: #Eeeadd; /* Based on image background approximate */
      --text-dark: #333;
      --input-bg: #f5f4ef;
      --input-border: #dcd7c9;
      --btn-text: #ffffff;
      font-family: 'Georgia', serif;
    }
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-dark);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Inter', system-ui, sans-serif;
    }

    .login-container {
      width: 100%;
      max-width: 400px;
      padding: 2rem;
    }

    .header-text {
      text-align: center;
      margin-bottom: 2rem;
      font-family: 'Georgia', serif;
    }

    .header-text h1 {
      font-size: 2rem;
      color: var(--primary);
      margin-bottom: 0.5rem;
    }

    .header-text p {
      font-style: italic;
      color: var(--secondary);
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-group label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--secondary);
      margin-bottom: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .form-control {
      width: 100%;
      padding: 0.8rem;
      border: 1px solid var(--input-border);
      background-color: var(--input-bg);
      border-radius: 2px;
      font-size: 1rem;
      outline: none;
    }
    
    .form-control:focus {
      border-color: var(--primary);
    }

    .password-wrapper {
      position: relative;
    }

    .eye-icon {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: #999;
    }

    .actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
      font-size: 0.9rem;
      color: var(--secondary);
    }

    .btn {
      width: 100%;
      padding: 1rem;
      background-color: var(--primary);
      color: var(--btn-text);
      border: none;
      border-radius: 2px;
      font-weight: 600;
      font-size: 0.9rem;
      letter-spacing: 1px;
      cursor: pointer;
      text-transform: uppercase;
      transition: background 0.3s;
    }

    .btn:hover {
      background-color: #3e4629;
    }

    .footer-link {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.9rem;
      color: var(--secondary);
    }
    .footer-link a {
      color: var(--secondary);
      text-decoration: none;
    }
    .footer-link a:hover {
      text-decoration: underline;
    }

    /* Required field asterisk */
    .required::after {
      content: " *";
      color: #a45a52;
    }
  </style>
</head>
<body>

  <div class="login-container">
    <div class="header-text" id="headerText">
      <h1 id="title">Welcome Back</h1>
      <p id="subtitle">Sign in to your account</p>
    </div>

    <form id="loginForm">
      <div class="form-group">
        <label class="required">Email</label>
        <input type="email" id="email" class="form-control" required>
      </div>
      
      <div class="form-group">
        <label class="required">Password</label>
        <div class="password-wrapper">
          <input type="password" id="password" class="form-control" required>
          <span class="eye-icon" id="eyeIcon" onclick="togglePwd()"><i data-lucide="eye-off" style="width:18px;height:18px;"></i></span>
        </div>
      </div>

      <div class="actions" id="actionsRow">
        <label><input type="checkbox"> Remember me</label>
        <a href="#" style="color:var(--secondary); text-decoration:none;">Forgot password?</a>
      </div>

      <button type="submit" class="btn" id="submitBtn">Sign In</button>

      <div class="footer-link" id="registerLink">
        <p>Don't have an account? <a href="register.html">Register</a></p>
      </div>
      <div class="footer-link">
        <a href="index.php" style="font-size: 0.8rem; opacity: 0.8;">&larr; Back to Portal</a>
      </div>
    </form>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const isAdmin = urlParams.has('admin');

    if (isAdmin) {
      document.getElementById('title').innerText = "Souveniria";
      document.getElementById('subtitle').innerText = "Admin Panel";
      document.getElementById('email').placeholder = "admin@souveniria.ph";
      document.getElementById('password').placeholder = "Enter admin password";
      document.getElementById('submitBtn').innerText = "SIGN IN TO ADMIN";
      document.getElementById('actionsRow').style.display = 'none';
      
      const regLink = document.getElementById('registerLink');
      regLink.innerHTML = `<p>Don't have an admin account? <a href="register.html?admin=true">Register Admin</a></p>`;
    }

    function togglePwd() {
      const pwd = document.getElementById('password');
      const iconContainer = document.getElementById('eyeIcon');
      if (pwd.type === 'password') {
        pwd.type = 'text';
        iconContainer.innerHTML = '<i data-lucide="eye" style="width:18px;height:18px;"></i>';
      } else {
        pwd.type = 'password';
        iconContainer.innerHTML = '<i data-lucide="eye-off" style="width:18px;height:18px;"></i>';
      }
      lucide.createIcons();
    }
    
    lucide.createIcons();

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      try {
        const response = await fetch('api/login.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password, is_admin: isAdmin })
        });
        const result = await response.json();

        if (response.ok) {
          Swal.fire({
            title: 'Success!',
            text: 'Logged in successfully.',
            icon: 'success',
            confirmButtonColor: '#525c38'
          }).then(() => {
            localStorage.setItem('user_id', result.user.id);
            localStorage.setItem('user_role', result.user.role);
            window.location.href = 'account.html';
          });
        } else {
          Swal.fire({
            title: 'Error!',
            text: result.message || 'Login failed.',
            icon: 'error',
            confirmButtonColor: '#525c38'
          });
        }
      } catch (error) {
        Swal.fire({
          title: 'Error!',
          text: 'Network error occurred.',
          icon: 'error',
          confirmButtonColor: '#525c38'
        });
      }
    });
  </script>
</body>
</html>
