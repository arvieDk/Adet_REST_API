<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Account - Souveniria</title>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    :root {
      --primary: #525c38;
      --secondary: #8C7B65;
      --bg-color: #Eeeadd;
      --bg-card: #fdfcf7;
      --text-dark: #333;
      --input-bg: #fdfcf7;
      --input-border: #e2dfd5;
      --btn-text: #ffffff;
      font-family: 'Inter', system-ui, sans-serif;
    }
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-dark);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 3rem;
    }

    .container {
      width: 100%;
      max-width: 900px;
      padding: 0 2rem;
    }

    .page-title {
      font-family: 'Georgia', serif;
      font-size: 2rem;
      color: var(--primary);
      margin-bottom: 1rem;
    }

    .divider {
      height: 1px;
      background-color: #d1ccbf;
      margin-bottom: 3rem;
      width: 100%;
    }

    .account-card {
      background: var(--bg-card);
      border-radius: 4px;
      border: 1px solid var(--input-border);
      padding: 2.5rem;
      display: flex;
      gap: 3rem;
      box-shadow: 0 4px 6px rgba(0,0,0,0.02);
    }

    .sidebar {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 150px;
    }

    .avatar-box {
      width: 120px;
      height: 120px;
      border: 1px solid var(--input-border);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Georgia', serif;
      font-size: 3rem;
      color: var(--primary);
      background-color: #fff;
      margin-bottom: 1rem;
    }

    .user-name {
      font-family: 'Georgia', serif;
      font-weight: 600;
      font-size: 1.1rem;
      margin-bottom: 0.5rem;
      text-align: center;
    }

    .badge {
      background-color: var(--primary);
      color: #fff;
      font-size: 0.7rem;
      padding: 0.3rem 0.6rem;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .main-content {
      flex: 1;
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
    }

    .section-title {
      font-family: 'Georgia', serif;
      font-size: 1.4rem;
      color: var(--primary);
    }

    .action-buttons {
      display: flex;
      gap: 1rem;
    }

    .btn-outline {
      padding: 0.6rem 1rem;
      background: transparent;
      border: 1px solid var(--secondary);
      color: var(--primary);
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }

    .btn-outline.danger {
      border-color: #c9ada9;
      color: #a45a52;
    }

    .btn-outline:hover {
      background-color: rgba(140, 123, 101, 0.05);
    }

    .btn-primary {
      padding: 0.6rem 1rem;
      background: var(--primary);
      border: 1px solid var(--primary);
      color: white;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }

    .btn-primary:hover {
      background-color: #3e472a;
    }

    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .info-box {
      background: #fff;
      border: 1px solid var(--input-border);
      padding: 1.2rem;
      border-radius: 2px;
    }

    .info-label {
      font-size: 0.7rem;
      color: var(--secondary);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 0.5rem;
    }

    .info-value {
      font-size: 1rem;
      color: var(--text-dark);
      font-weight: 500;
    }

    .info-input {
      display: none;
      width: 100%;
      padding: 0.5rem;
      border: 1px solid var(--input-border);
      border-radius: 4px;
      font-size: 1rem;
      font-family: inherit;
    }

    .full-width {
      grid-column: 1 / -1;
    }

    /* Required field asterisk */
    .required::after {
      content: " *";
      color: #a45a52;
    }

    /* Admin Table Styles */
    .admin-dashboard {
      display: none;
      width: 100%;
      margin-top: 3rem;
    }

    .admin-customer-table {
      width: 100%;
      border-collapse: collapse;
      background: var(--white);
      border-radius: 4px;
      overflow: hidden;
      box-shadow: 0 4px 6px rgba(0,0,0,0.02);
      border: 1px solid var(--input-border);
    }

    .admin-customer-table th {
      background: var(--primary);
      color: var(--white);
      text-align: left;
      padding: 1rem;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .admin-customer-table td {
      padding: 1rem;
      border-bottom: 1px solid var(--input-border);
      font-size: 0.9rem;
      color: var(--text-dark);
    }

    .admin-customer-table tr:last-child td {
      border-bottom: none;
    }

    .admin-customer-table tr:hover {
      background: #fcfcf9;
    }
    
    .btn-delete {
      padding: 0.4rem 0.8rem;
      background: #a45a52;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 0.75rem;
      cursor: pointer;
      text-transform: uppercase;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
    }
    .btn-delete:hover {
      background: #8b4a43;
    }

  </style>
</head>
<body>

  <div class="container">
    <h1 class="page-title">My Account</h1>
    <div class="divider"></div>

    <div class="account-card">
      <div class="sidebar">
        <div class="avatar-box" id="avatarChar"><i data-lucide="user" style="width: 60px; height: 60px;"></i></div>
        <div class="user-name" id="profileName">Loading...</div>
        <div class="badge" id="roleBadge">MEMBER</div>
      </div>

      <div class="main-content">
        <div class="section-header">
          <h2 class="section-title">Identification Details</h2>
          <div class="action-buttons">
            <button class="btn-outline" id="editBtn" onclick="toggleEdit()"><i data-lucide="edit-3" style="width:14px;height:14px;"></i> <span>EDIT DETAILS</span></button>
            <button class="btn-primary" id="saveBtn" style="display: none;" onclick="saveDetails()"><i data-lucide="check" style="width:14px;height:14px;"></i> <span>SAVE CHANGES</span></button>
            <button class="btn-outline danger" onclick="logout()"><i data-lucide="log-out" style="width:14px;height:14px;"></i> <span>LOGOUT</span></button>
          </div>
        </div>

        <div class="info-grid">
           <!-- Added Full Name row for editing -->
           <div class="info-box full-width" id="fnBox" style="display: none;">
            <div class="info-label required">Full Name</div>
            <input type="text" class="info-input" id="editName" style="display: block;">
          </div>

          <div class="info-box">
            <div class="info-label required">Email Address</div>
            <div class="info-value" id="dispEmail">-</div>
            <input type="email" class="info-input" id="editEmail">
          </div>
          <div class="info-box">
            <div class="info-label required">Contact Number</div>
            <div class="info-value" id="dispContact">-</div>
            <input type="text" class="info-input" id="editContact">
          </div>
          
          <div class="info-box" id="regBox" style="display: none;">
            <div class="info-label required">Region</div>
            <div class="info-value" id="dispRegion">-</div>
            <select class="info-input" id="editRegion"></select>
          </div>
          <div class="info-box" id="provBox" style="display: none;">
            <div class="info-label required">Province</div>
            <div class="info-value" id="dispProvince">-</div>
            <select class="info-input" id="editProvince"></select>
          </div>
          <div class="info-box" id="cityBox" style="display: none;">
            <div class="info-label required">City</div>
            <div class="info-value" id="dispCity">-</div>
            <select class="info-input" id="editCity"></select>
          </div>
          <div class="info-box" id="barBox" style="display: none;">
            <div class="info-label required">Barangay</div>
            <div class="info-value" id="dispBarangay">-</div>
            <select class="info-input" id="editBarangay"></select>
          </div>

          <div class="info-box full-width" id="addrViewBox">
            <div class="info-label">Registered Address</div>
            <div class="info-value" id="dispAddress">-</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Admin Customer Directory -->
    <div class="admin-dashboard" id="adminDashboard">
      <div class="divider" style="margin-bottom: 2rem;"></div>
      <h2 class="section-title" style="margin-bottom: 1rem;">Customer Directory</h2>
      <table class="admin-customer-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Full Name</th>
            <th>Email</th>
            <th>Contact</th>
            <th>Address</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="customerTableBody">
          <!-- Populated by JS -->
        </tbody>
      </table>
    </div>

  </div>

  <script>
    const userId = localStorage.getItem('user_id');
    const userRole = localStorage.getItem('user_role');

    if (!userId) {
      window.location.href = 'login.html';
    }

    async function loadAccount() {
      try {
        const response = await fetch('api/account.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id: userId, role: userRole })
        });
        const result = await response.json();

        if (response.ok) {
          const data = result.data;
          
          if (userRole === 'admin') {
            document.getElementById('avatarChar').innerHTML = '<i data-lucide="shield-check" style="width: 60px; height: 60px;"></i>';
            document.getElementById('profileName').innerText = data.full_name || 'Administrator';
            document.getElementById('roleBadge').innerText = 'ADMIN';
            document.getElementById('dispEmail').innerText = data.email;
            document.getElementById('dispContact').innerText = data.contact_number || '-';

            // Set hidden fields for editing
            document.getElementById('editName').value = data.full_name || '';
            document.getElementById('editEmail').value = data.email;
            document.getElementById('editContact').value = data.contact_number || '';
            document.getElementById('editRegion').value = data.region || '';
            document.getElementById('editProvince').value = data.province || '';
            document.getElementById('editCity').value = data.city || '';
            document.getElementById('editBarangay').value = data.barangay || '';

            // Individual address displays
            document.getElementById('dispRegion').innerText = data.region || '-';
            document.getElementById('dispProvince').innerText = data.province || '-';
            document.getElementById('dispCity').innerText = data.city || '-';
            document.getElementById('dispBarangay').innerText = data.barangay || '-';

            const addrParts = [];
            if (data.barangay) addrParts.push(data.barangay);
            if (data.city) addrParts.push(data.city);
            if (data.province) addrParts.push(data.province);
            if (data.region) addrParts.push(data.region);
            
            document.getElementById('dispAddress').innerText = addrParts.length > 0 ? addrParts.join(', ') : 'No address registered';

            // Store current address for rehydration
            window.currentAddress = {
              region: data.region,
              province: data.province,
              city: data.city,
              barangay: data.barangay
            };
            
            document.getElementById('adminDashboard').style.display = 'block';
            loadCustomers();
          } else {
            document.getElementById('avatarChar').innerHTML = '<i data-lucide="user" style="width: 60px; height: 60px;"></i>';
            document.getElementById('profileName').innerText = data.full_name;
            document.getElementById('roleBadge').innerText = 'NEW MEMBER';
            document.getElementById('dispEmail').innerText = data.email;
            document.getElementById('dispContact').innerText = data.contact_number || '-';
            
            // Set hidden fields for editing
            document.getElementById('editName').value = data.full_name;
            document.getElementById('editEmail').value = data.email;
            document.getElementById('editContact').value = data.contact_number || '';
            document.getElementById('editRegion').value = data.region || '';
            document.getElementById('editProvince').value = data.province || '';
            document.getElementById('editCity').value = data.city || '';
            document.getElementById('editBarangay').value = data.barangay || '';

            // Individual address displays (hidden by default unless edit)
            document.getElementById('dispRegion').innerText = data.region || '-';
            document.getElementById('dispProvince').innerText = data.province || '-';
            document.getElementById('dispCity').innerText = data.city || '-';
            document.getElementById('dispBarangay').innerText = data.barangay || '-';
            
            const addrParts = [];
            if (data.barangay) addrParts.push(data.barangay);
            if (data.city) addrParts.push(data.city);
            if (data.province) addrParts.push(data.province);
            if (data.region) addrParts.push(data.region);
            
            document.getElementById('dispAddress').innerText = addrParts.length > 0 ? addrParts.join(', ') : 'No address registered';

            // Store current address for rehydration
            window.currentAddress = {
              region: data.region,
              province: data.province,
              city: data.city,
              barangay: data.barangay
            };
          }
        } else {
          Swal.fire({
            title: 'Session Expired',
            text: 'Please log in again.',
            icon: 'warning'
          }).then(() => {
            logout();
          });
        }
      } catch (error) {
        Swal.fire('Error', 'Failed to fetch account info.', 'error');
      }
    }

    let isEditing = false;
    function toggleEdit() {
      console.log("Toggle Edit clicked. Current state isEditing:", isEditing);
      isEditing = !isEditing;
      const displayStyle = isEditing ? 'none' : 'block';
      const inputStyle = isEditing ? 'block' : 'none';

      // Toggle buttons
      document.getElementById('editBtn').style.display = isEditing ? 'none' : 'inline-flex';
      document.getElementById('saveBtn').style.display = isEditing ? 'inline-flex' : 'none';

      // Toggle display vs input
      document.querySelectorAll('.info-value').forEach(el => el.style.display = displayStyle);
      document.querySelectorAll('.info-input').forEach(el => el.style.display = inputStyle);

      // Special handling for the hidden address boxes
      const boxes = ['regBox', 'provBox', 'cityBox', 'barBox', 'fnBox'];
      boxes.forEach(id => {
        document.getElementById(id).style.display = isEditing ? 'block' : 'none';
      });

      if (isEditing) {
        rehydrateAddress();
      } else {
        loadAccount(); // Revert on cancel
      }
      lucide.createIcons();
    }

    async function rehydrateAddress() {
      console.log("Rehydrating address dropdowns...");
      await loadRegions();
      if (window.currentAddress?.region) {
        const select = document.getElementById('editRegion');
        if (selectByText(select, window.currentAddress.region)) {
          await loadProvinces(select.value);
          
          if (window.currentAddress.province) {
            const pSel = document.getElementById('editProvince');
            if (selectByText(pSel, window.currentAddress.province)) {
              if (pSel.value !== 'N/A') await loadCities(pSel.value);
              
              if (window.currentAddress.city) {
                const cSel = document.getElementById('editCity');
                if (selectByText(cSel, window.currentAddress.city)) {
                  await loadBarangays(cSel.value);
                  
                  if (window.currentAddress.barangay) {
                    const bSel = document.getElementById('editBarangay');
                    selectByText(bSel, window.currentAddress.barangay);
                  }
                }
              }
            }
          }
        }
      }
    }

    function selectByText(selectEl, text) {
      for (let i = 0; i < selectEl.options.length; i++) {
        if (selectEl.options[i].textContent === text || selectEl.options[i].dataset.name === text) {
          selectEl.selectedIndex = i;
          return true;
        }
      }
      return false;
    }

    async function saveDetails() {
      Swal.fire({
        title: 'Save changes?',
        text: "Are you sure you want to update your profile? (Clicking Cancel will exit edit mode)",
        icon: 'question',
        showCancelButton: true,
        confirmButtonColor: '#525c38',
        cancelButtonColor: '#d33',
        confirmButtonText: 'Yes, Save',
        cancelButtonText: 'Cancel & Exit'
      }).then(async (result) => {
        if (result.isConfirmed) {
          await performSave();
        } else {
          // If they cancel the popup, exit edit mode
          toggleEdit();
        }
      });
    }

    async function performSave() {
      console.log("Saving details...");
      const regionSel = document.getElementById('editRegion');
      const provinceSel = document.getElementById('editProvince');
      const citySel = document.getElementById('editCity');
      const barangaySel = document.getElementById('editBarangay');

      const payload = {
        id: userId,
        role: userRole,
        full_name: document.getElementById('editName').value,
        email: document.getElementById('editEmail').value,
        contact_number: document.getElementById('editContact').value,
        region: regionSel.options[regionSel.selectedIndex].dataset.name,
        province: provinceSel.options[provinceSel.selectedIndex].dataset.name,
        city: citySel.options[citySel.selectedIndex].dataset.name,
        barangay: barangaySel.options[barangaySel.selectedIndex].dataset.name
      };
      console.log("Payload:", payload);

      try {
        const response = await fetch('api/update_account.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const res = await response.json();

        if (response.ok) {
          Swal.fire('Success', 'Profile updated successfully!', 'success').then(() => {
            toggleEdit(); // Turn off edit mode
            loadAccount(); // Reload data
          });
        } else {
          Swal.fire('Error', res.message || 'Update failed.', 'error');
        }
      } catch (e) {
        Swal.fire('Error', 'Network error.', 'error');
      }
    }

    async function loadCustomers() {
      try {
        const response = await fetch('api/list_customers.php');
        const result = await response.json();
        if (response.ok) {
          const tbody = document.getElementById('customerTableBody');
          tbody.innerHTML = '';
          result.data.forEach(cust => {
            const addrParts = [];
            if(cust.barangay) addrParts.push(cust.barangay);
            if(cust.city) addrParts.push(cust.city);
            if(cust.province) addrParts.push(cust.province);
            const address = addrParts.length ? addrParts.join(', ') : 'N/A';
            
            tbody.innerHTML += `
              <tr>
                <td>${cust.id}</td>
                <td>${cust.full_name}</td>
                <td>${cust.email}</td>
                <td>${cust.contact_number || 'N/A'}</td>
                <td>${address}</td>
                <td>
                  <button class="btn-delete" onclick="deleteCustomer(${cust.id})">
                    <i data-lucide="trash-2" style="width:14px;height:14px;"></i>
                    Delete
                  </button>
                </td>
              </tr>
            `;
          });
          lucide.createIcons();
        }
      } catch (e) {
        console.error("Failed to load customers:", e);
      }
    }



    function deleteCustomer(custId) {
      Swal.fire({
        title: 'Are you sure?',
        text: "This customer and their address will be permanently deleted!",
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#a45a52',
        cancelButtonColor: '#525c38',
        confirmButtonText: 'Yes, delete!'
      }).then(async (result) => {
        if (result.isConfirmed) {
          try {
            const response = await fetch('api/delete_customer.php', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ customer_id: custId, is_admin: true })
            });
            const res = await response.json();
            if (response.ok) {
              Swal.fire('Deleted!', 'The customer has been deleted.', 'success');
              loadCustomers(); // refresh table
            } else {
              Swal.fire('Error!', res.message || 'Failed to delete.', 'error');
            }
          } catch(e) {
            Swal.fire('Error!', 'Network error.', 'error');
          }
        }
      });
    }

    // --- Fixed Philippines Address Selector (Native Dropdown) ---
    const PSGC_BASE = 'https://psgc.gitlab.io/api';

    async function loadRegions() {
      try {
        const response = await fetch(`${PSGC_BASE}/regions/`);
        const data = await response.json();
        const regions = data.value || data;
        const select = document.getElementById('editRegion');
        select.innerHTML = '<option value="" disabled selected>Select Region</option>';
        
        regions.forEach(r => {
          let opt = document.createElement('option');
          opt.value = r.code;
          const isShortName = r.name.length <= 5;
          const displayName = isShortName ? `${r.name} (${r.regionName})` : `${r.regionName} (${r.name})`;
          
          opt.dataset.name = displayName;
          opt.textContent = displayName;
          select.appendChild(opt);
        });
      } catch (err) { console.error("Failed to load regions", err); }
    }

    async function loadProvinces(regionCode) {
      const select = document.getElementById('editProvince');
      select.innerHTML = '<option value="" disabled selected>Select Province</option>';
      const citySelect = document.getElementById('editCity');
      citySelect.innerHTML = '<option value="" disabled selected>Select City/Municipality</option>';
      const brgySelect = document.getElementById('editBarangay');
      brgySelect.innerHTML = '<option value="" disabled selected>Select Barangay</option>';
      
      try {
        const response = await fetch(`${PSGC_BASE}/regions/${regionCode}/provinces/`);
        const provinces = await response.json();
        
        if (provinces.length === 0) {
          let opt = document.createElement('option');
          opt.value = 'N/A';
          opt.dataset.name = 'N/A';
          opt.textContent = 'N/A (Direct to City)';
          select.appendChild(opt);
          loadCities(regionCode, true);
        } else {
          provinces.sort((a, b) => a.name.localeCompare(b.name)).forEach(p => {
            let opt = document.createElement('option');
            opt.value = p.code;
            opt.dataset.name = p.name;
            opt.textContent = p.name;
            select.appendChild(opt);
          });
        }
      } catch (err) { console.error("Failed to load provinces", err); }
    }

    async function loadCities(code, isRegion = false) {
      const select = document.getElementById('editCity');
      select.innerHTML = '<option value="" disabled selected>Select City/Municipality</option>';
      const brgySelect = document.getElementById('editBarangay');
      brgySelect.innerHTML = '<option value="" disabled selected>Select Barangay</option>';
      
      try {
        const url = isRegion ? `${PSGC_BASE}/regions/${code}/cities-municipalities/` : `${PSGC_BASE}/provinces/${code}/cities-municipalities/`;
        const response = await fetch(url);
        const data = await response.json();
        data.sort((a, b) => a.name.localeCompare(b.name)).forEach(c => {
          let opt = document.createElement('option');
          opt.value = c.code;
          opt.dataset.name = c.name;
          opt.textContent = c.name;
          select.appendChild(opt);
        });
      } catch (err) { console.error("Failed to load cities", err); }
    }

    async function loadBarangays(cityCode) {
      const select = document.getElementById('editBarangay');
      select.innerHTML = '<option value="" disabled selected>Select Barangay</option>';
      try {
        const response = await fetch(`${PSGC_BASE}/cities-municipalities/${cityCode}/barangays/`);
        const barangays = await response.json();
        barangays.sort((a, b) => a.name.localeCompare(b.name)).forEach(b => {
          let opt = document.createElement('option');
          opt.value = b.code;
          opt.dataset.name = b.name;
          opt.textContent = b.name;
          select.appendChild(opt);
        });
      } catch (err) { console.error("Failed to load barangays", err); }
    }

    document.getElementById('editRegion').addEventListener('change', (e) => loadProvinces(e.target.value));
    document.getElementById('editProvince').addEventListener('change', (e) => {
      if (e.target.value && e.target.value !== 'N/A') loadCities(e.target.value);
    });
    document.getElementById('editCity').addEventListener('change', (e) => loadBarangays(e.target.value));

    function logout() {
      Swal.fire({
        title: 'Are you sure?',
        text: "You will be logged out of your account.",
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#525c38',
        cancelButtonColor: '#a45a52',
        confirmButtonText: 'Yes, Logout'
      }).then((result) => {
        if (result.isConfirmed) {
          localStorage.removeItem('user_id');
          localStorage.removeItem('user_role');
          window.location.href = 'index.php';
        }
      });
    }

    loadAccount();
    lucide.createIcons();
  </script>
</body>
</html>
