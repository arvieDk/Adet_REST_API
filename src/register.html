<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Souveniria</title>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    :root {
      --primary: #525c38;
      --secondary: #8C7B65;
      --bg-color: #Eeeadd;
      --text-dark: #333;
      --input-bg: #f5f4ef;
      --input-border: #dcd7c9;
      --btn-text: #ffffff;
      font-family: 'Georgia', serif;
    }
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-dark);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Inter', system-ui, sans-serif;
    }

    .register-container {
      width: 100%;
      max-width: 600px;
      padding: 2rem;
    }

    .header-text {
      text-align: center;
      margin-bottom: 2rem;
      font-family: 'Georgia', serif;
    }

    .header-text h1 {
      font-size: 2rem;
      color: var(--primary);
      margin-bottom: 0.5rem;
    }

    .header-text p {
      font-style: italic;
      color: var(--secondary);
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-row {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .form-row .form-group {
      flex: 1;
      margin-bottom: 0;
    }

    .form-group label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--secondary);
      margin-bottom: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .form-control {
      width: 100%;
      padding: 0.8rem;
      border: 1px solid var(--input-border);
      background-color: var(--input-bg);
      border-radius: 2px;
      font-size: 1rem;
      outline: none;
    }
    
    .form-control:focus {
      border-color: var(--primary);
    }

    .password-wrapper {
      position: relative;
    }

    .eye-icon {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: #999;
    }

    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
      font-size: 0.9rem;
      color: var(--secondary);
    }

    .btn {
      width: 100%;
      padding: 1rem;
      background-color: var(--primary);
      color: var(--btn-text);
      border: none;
      border-radius: 2px;
      font-weight: 600;
      font-size: 0.9rem;
      letter-spacing: 1px;
      cursor: pointer;
      text-transform: uppercase;
      transition: background 0.3s;
    }

    .btn:hover {
      background-color: #3e4629;
    }

    select.form-control {
      appearance: none;
      background-image: url('data:image/svg+xml;utf8,<svg fill="%238C7B65" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M7 10l5 5 5-5z"/></svg>');
      background-repeat: no-repeat;
      background-position: right 8px center;
    }

    /* Required field asterisk */
    .required::after {
      content: " *";
      color: #a45a52;
    }
  </style>
</head>
<body>

  <div class="register-container">
    <div class="header-text">
      <h1 id="pageTitle">Create Account</h1>
      <p id="pageSubtitle">Join the Souveniria family</p>
    </div>

    <form id="registerForm">
      <div class="form-group" id="fnGroup">
        <label class="required">Full Name</label>
        <input type="text" id="full_name" class="form-control" required>
      </div>
      
      <div class="form-group">
        <label class="required">Email</label>
        <input type="email" id="email" class="form-control" required>
      </div>
 
      <div class="form-row">
        <div class="form-group">
          <label class="required">Password</label>
          <div class="password-wrapper">
            <input type="password" id="password" class="form-control" required>
            <span class="eye-icon" id="eyeIconPwd" onclick="togglePwd('password', 'eyeIconPwd')"><i data-lucide="eye-off" style="width:18px;height:18px;"></i></span>
          </div>
        </div>
        <div class="form-group">
          <label class="required">Confirm Password</label>
          <div class="password-wrapper">
            <input type="password" id="confirm_password" class="form-control" required>
            <span class="eye-icon" id="eyeIconCpwd" onclick="togglePwd('confirm_password', 'eyeIconCpwd')"><i data-lucide="eye-off" style="width:18px;height:18px;"></i></span>
          </div>
        </div>
      </div>

      <div id="customerFields">
        <div class="form-group">
          <label class="required">Contact Number</label>
          <input type="text" id="contact" class="form-control" placeholder="09171234567" required>
        </div>
 
      <div class="form-group">
        <label class="required">Region</label>
        <select id="region" class="form-control" required>
          <option value="" disabled selected>Select Region</option>
        </select>
      </div>
 
      <div class="form-row">
        <div class="form-group">
          <label class="required">Province</label>
          <select id="province" class="form-control" required>
            <option value="" disabled selected>Select Province</option>
          </select>
        </div>
        <div class="form-group">
          <label class="required">City / Municipality</label>
          <select id="city" class="form-control" required>
            <option value="" disabled selected>Select City/Municipality</option>
          </select>
        </div>
      </div>
 
      <div class="form-group">
        <label class="required">Barangay</label>
        <select id="barangay" class="form-control" required>
          <option value="" disabled selected>Select Barangay</option>
        </select>
      </div>

      <div class="checkbox-group">
        <input type="checkbox" id="terms" required>
        <label for="terms">I agree to the Terms of Service and Privacy Policy</label>
      </div>
      </div> <!-- End of customerFields -->

      <button type="submit" class="btn" id="submitBtn">Create Account</button>

      <div class="header-text" style="margin-top: 1.5rem; margin-bottom: 0;">
        <a href="index.php" style="font-size: 0.9rem; color: var(--secondary); text-decoration: none;">&larr; Back to Portal</a>
      </div>

    </form>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const isAdmin = urlParams.has('admin');

    if (isAdmin) {
      document.getElementById('pageTitle').innerText = "Create Admin Account";
      document.getElementById('pageSubtitle').innerText = "Souveniria Administration";
      document.getElementById('submitBtn').innerText = "Register Admin";
    }

    // --- Fixed Philippines Address Selector (Native Dropdown) ---
    const PSGC_BASE = 'https://psgc.gitlab.io/api';

    async function loadRegions() {
      try {
        const response = await fetch(`${PSGC_BASE}/regions/`);
        const data = await response.json();
        const regions = data.value || data; // Handle different API response shapes
        const select = document.getElementById('region');
        select.innerHTML = '<option value="" disabled selected>Select Region</option>';
        
        regions.forEach(r => {
          let opt = document.createElement('option');
          opt.value = r.code;
          // Logic: Short designation first, then full name
          // For NCR/BARMM: name (regionName)
          // For others: regionName (name)
          const isShortName = r.name.length <= 5;
          const displayName = isShortName ? `${r.name} (${r.regionName})` : `${r.regionName} (${r.name})`;
          
          opt.dataset.name = displayName;
          opt.textContent = displayName;
          select.appendChild(opt);
        });
      } catch (err) { console.error("Failed to load regions", err); }
    }

    async function loadProvinces(regionCode) {
      const select = document.getElementById('province');
      select.innerHTML = '<option value="" disabled selected>Select Province</option>';
      const citySelect = document.getElementById('city');
      citySelect.innerHTML = '<option value="" disabled selected>Select City/Municipality</option>';
      const brgySelect = document.getElementById('barangay');
      brgySelect.innerHTML = '<option value="" disabled selected>Select Barangay</option>';
      
      try {
        const response = await fetch(`${PSGC_BASE}/regions/${regionCode}/provinces/`);
        const provinces = await response.json();
        
        if (provinces.length === 0) {
          let opt = document.createElement('option');
          opt.value = 'N/A';
          opt.dataset.name = 'N/A';
          opt.textContent = 'N/A (Direct to City)';
          select.appendChild(opt);
          loadCities(regionCode, true);
        } else {
          provinces.sort((a, b) => a.name.localeCompare(b.name)).forEach(p => {
            let opt = document.createElement('option');
            opt.value = p.code;
            opt.dataset.name = p.name;
            opt.textContent = p.name;
            select.appendChild(opt);
          });
        }
      } catch (err) { console.error("Failed to load provinces", err); }
    }

    async function loadCities(code, isRegion = false) {
      const select = document.getElementById('city');
      select.innerHTML = '<option value="" disabled selected>Select City/Municipality</option>';
      const brgySelect = document.getElementById('barangay');
      brgySelect.innerHTML = '<option value="" disabled selected>Select Barangay</option>';
      
      try {
        const url = isRegion ? `${PSGC_BASE}/regions/${code}/cities-municipalities/` : `${PSGC_BASE}/provinces/${code}/cities-municipalities/`;
        const response = await fetch(url);
        const data = await response.json();
        data.sort((a, b) => a.name.localeCompare(b.name)).forEach(c => {
          let opt = document.createElement('option');
          opt.value = c.code;
          opt.dataset.name = c.name;
          opt.textContent = c.name;
          select.appendChild(opt);
        });
      } catch (err) { console.error("Failed to load cities", err); }
    }

    async function loadBarangays(cityCode) {
      const select = document.getElementById('barangay');
      select.innerHTML = '<option value="" disabled selected>Select Barangay</option>';
      try {
        const response = await fetch(`${PSGC_BASE}/cities-municipalities/${cityCode}/barangays/`);
        const barangays = await response.json();
        barangays.sort((a, b) => a.name.localeCompare(b.name)).forEach(b => {
          let opt = document.createElement('option');
          opt.value = b.code;
          opt.dataset.name = b.name;
          opt.textContent = b.name;
          select.appendChild(opt);
        });
      } catch (err) { console.error("Failed to load barangays", err); }
    }

    document.getElementById('region').addEventListener('change', (e) => loadProvinces(e.target.value));
    document.getElementById('province').addEventListener('change', (e) => {
      if (e.target.value !== 'N/A') loadCities(e.target.value);
    });
    document.getElementById('city').addEventListener('change', (e) => loadBarangays(e.target.value));

    loadRegions();
    // --- End Address Logic ---

    function togglePwd(id, iconId) {
      const pwd = document.getElementById(id);
      const iconContainer = document.getElementById(iconId);
      if (pwd.type === 'password') {
        pwd.type = 'text';
        iconContainer.innerHTML = '<i data-lucide="eye" style="width:18px;height:18px;"></i>';
      } else {
        pwd.type = 'password';
        iconContainer.innerHTML = '<i data-lucide="eye-off" style="width:18px;height:18px;"></i>';
      }
      lucide.createIcons();
    }
    
    lucide.createIcons();

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const pwd = document.getElementById('password').value;
      const cpwd = document.getElementById('confirm_password').value;
      
      if (pwd !== cpwd) {
        Swal.fire({
          title: 'Error!',
          text: 'Passwords do not match.',
          icon: 'error',
          confirmButtonColor: '#525c38'
        });
        return;
      }

      const payload = {
        is_admin: isAdmin,
        email: document.getElementById('email').value,
        password: pwd
      };

      const regionSel = document.getElementById('region');
      const provinceSel = document.getElementById('province');
      const citySel = document.getElementById('city');
      const barangaySel = document.getElementById('barangay');

      payload.full_name = document.getElementById('full_name').value;
      payload.contact_number = document.getElementById('contact').value;
      payload.region = regionSel.options[regionSel.selectedIndex].dataset.name;
      payload.province = provinceSel.options[provinceSel.selectedIndex].dataset.name;
      payload.city = citySel.options[citySel.selectedIndex].dataset.name;
      payload.barangay = barangaySel.options[barangaySel.selectedIndex].dataset.name;

      try {
        const response = await fetch('api/register.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const result = await response.json();

        if (response.ok) {
          // Auto-Login: Save credentials
          localStorage.setItem('user_id', result.id);
          localStorage.setItem('user_role', isAdmin ? 'admin' : 'customer');

          Swal.fire({
            title: 'Welcome to Souveniria!',
            text: 'Your account has been created and you are now logged in.',
            icon: 'success',
            confirmButtonColor: '#525c38'
          }).then(() => {
            window.location.href = 'account.html';
          });
        } else {
          Swal.fire({
            title: 'Error!',
            text: result.message || 'Registration failed.',
            icon: 'error',
            confirmButtonColor: '#525c38'
          });
        }
      } catch (error) {
        Swal.fire({
          title: 'Error!',
          text: 'Network error occurred.',
          icon: 'error',
          confirmButtonColor: '#525c38'
        });
      }
    });
  </script>
</body>
</html>
